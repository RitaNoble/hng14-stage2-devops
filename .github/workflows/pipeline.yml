name: DevOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 api worker

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install pytest fastapi httpx redis
      - run: PYTHONPATH=api pytest api/tests -v

build:
  runs-on: ubuntu-latest
  needs: test

  services:
    registry:
      image: registry:2
      ports:
        - 5000:5000

  steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Wait for registry
      run: sleep 5

    # -------------------------
    # BUILD IMAGES
    # -------------------------

    - name: Build API image
      run: |
        docker build \
          -t localhost:5000/api:${{ github.sha }} \
          -t localhost:5000/api:latest \
          ./api

    - name: Build Worker image
      run: |
        docker build \
          -t localhost:5000/worker:${{ github.sha }} \
          -t localhost:5000/worker:latest \
          ./worker

    # -------------------------
    # PUSH IMAGES TO REGISTRY
    # -------------------------

    - name: Push API image
      run: |
        docker push localhost:5000/api:${{ github.sha }}
        docker push localhost:5000/api:latest

    - name: Push Worker image
      run: |
        docker push localhost:5000/worker:${{ github.sha }}
        docker push localhost:5000/worker:latest

security:
  runs-on: ubuntu-latest
  needs: build

  steps:
    - uses: actions/checkout@v3

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.48.0_Linux-64bit.deb

    - name: Scan API image
      run: |
        trivy image --exit-code 1 --severity CRITICAL,HIGH localhost:5000/api:${{ github.sha }}

    - name: Scan Worker image
      run: |
        trivy image --exit-code 1 --severity CRITICAL,HIGH localhost:5000/worker:${{ github.sha }}
