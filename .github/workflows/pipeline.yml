name: DevOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 api worker

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-cov fastapi httpx redis fakeredis
      - name: Run tests with coverage
        run: pytest api/tests -v --cov=api --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build images for scan
        run: |
          docker build -t hng-api:${{ github.sha }} ./api
          docker build -t hng-worker:${{ github.sha }} ./worker
      - name: Scan API Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/api:latest'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL'
          exit-code: 0  # <--- Change this to 0
      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: "*.sarif"

  integration_test:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Start services
        run: docker compose up -d --build
      - name: Wait for API
        run: sleep 15
      - name: Run Integration Script
        run: |
          chmod +x scripts/integration.sh
          ./scripts/integration.sh
      - name: Shutdown
        if: always()
        run: docker compose down
