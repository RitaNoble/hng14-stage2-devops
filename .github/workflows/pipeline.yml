name: DevOps Pipeline

on:
push:
branches: [main]
pull_request:

jobs:

lint:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  # ---------- Python Lint ----------
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Cache pip
    uses: actions/cache@v4
    with:
      path: ~/.cache/pip
      key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}

  - name: Install Python dependencies
    run: |
      pip install -r api/requirements.txt
      pip install flake8

  - name: Lint Python (STRICT)
    run: |
      flake8 api worker --ignore=E402,E302,E501

  # ---------- JavaScript Lint ----------
  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Cache npm
    uses: actions/cache@v4
    with:
      path: ~/.npm
      key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}

  - name: Install frontend dependencies
    working-directory: frontend
    run: npm install

  - name: Run ESLint (REAL)
    working-directory: frontend
    run: npm run lint

  # ---------- Docker Lint ----------
  - name: Run Hadolint
    uses: hadolint/hadolint-action@v3.1.0
    with:
      recursive: true
      ignore: DL3008
```

test:
runs-on: ubuntu-latest
needs: lint

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      pip install -r api/requirements.txt

  - name: Run tests with coverage
    run: |
      pytest api/tests -v --cov=api --cov-report=xml --cov-fail-under=80

  - name: Upload coverage report
    uses: actions/upload-artifact@v4
    with:
      name: coverage-report
      path: coverage.xml
```

build:
runs-on: ubuntu-latest
needs: test

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Build API image
    run: docker build -t api ./api

  - name: Build Frontend image
    run: docker build -t frontend ./frontend

  # Optional (safe local test build)
  - name: Verify docker compose config
    run: docker compose config
