name: DevOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 api worker

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install pytest fastapi httpx redis
      - run: pytest api/tests -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - run: echo "build stage placeholder"

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build API image
        run: docker build -t hng14-stage2-devops-api ./api

      - name: Build Worker image
        run: docker build -t hng14-stage2-devops-worker ./worker

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hng14-stage2-devops-api
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL'
          exit-code: '0'
          
      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hng14-stage2-devops-worker
          format: 'sarif'
          output: 'trivy-worker.sarif'
          severity: 'CRITICAL'
          exit-code: '0'      

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: |
            trivy-api.sarif
            trivy-worker.sarif

integration_test:
    runs-on: ubuntu-latest
    needs: [build, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose jq

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 15

      - name: Create job
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Wait for completion
        run: sleep 10

      - name: Verify job status
        run: |
          STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r .status)
          echo "Status: $STATUS"
          if [ "$STATUS" != "completed" ]; then
            echo "Job not completed"
            exit 1
          fi

      - name: Shutdown services
        if: always()
        run: docker compose down
