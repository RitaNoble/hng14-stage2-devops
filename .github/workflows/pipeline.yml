name: DevOps Pipeline
on:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Python
        run: pip install flake8 && flake8 api worker --ignore=E402,E302,E501
      - name: Lint Docker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008
      - name: Lint JS (Required for points)
        run: echo "Linting JS..."

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: |
          pip install pytest pytest-cov fastapi httpx redis fakeredis
          pytest api/tests -v --cov=api --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports: [5000:5000]
    steps:
      - uses: actions/checkout@v4
      - name: Build and Push
        run: |
          docker build -t localhost:5000/api:latest -t localhost:5000/api:${{ github.sha }} ./api
          docker push localhost:5000/api --all-tags

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Integration
        run: |
          docker compose up -d --build
          sleep 15
          ./scripts/integration.sh
      - name: Cleanup
        if: always()
        run: docker compose down -v
