name: DevOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run lint
        run: flake8 api worker


  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest fastapi httpx redis

      - name: Run tests
        run: PYTHONPATH=api pytest api/tests -v

build:
  runs-on: ubuntu-latest
  needs: test

  services:
    registry:
      image: registry:2
      ports:
        - 5000:5000

  steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to local registry
      run: echo "Using local registry at localhost:5000"

    - name: Build API image
      run: |
        docker build \
          -t localhost:5000/api:${{ github.sha }} \
          -t localhost:5000/api:latest \
          ./api

    - name: Build Worker image
      run: |
        docker build \
          -t localhost:5000/worker:${{ github.sha }} \
          -t localhost:5000/worker:latest \
          ./worker

    - name: Push images to registry
      run: |
        docker push localhost:5000/api:${{ github.sha }}
        docker push localhost:5000/api:latest
        docker push localhost:5000/worker:${{ github.sha }}
        docker push localhost:5000/worker:latest
